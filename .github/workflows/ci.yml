name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nim-tests:
    name: Nim tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: metacraft-labs/isonim
          path: ../isonim
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: metacraft-labs/nim-everywhere
          path: ../nim-everywhere
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nim check (renderer — Android JNI surface)
        run: nix develop -c bash -c "nim check -d:mockJni nim-lib/src/isonim_android/renderer.nim"

      - name: Run JNI stub smoke tests
        run: nix develop -c bash -c "just test"

      # The task-app demo's host-side end-to-end tests live in
      # `isonim-examples/tests/test_android_leaves_compile.nim` and
      # `tests/test_android_leaves_android_only.nim` since EX-M6 (the
      # standalone `demos/task-manager/src/main.nim` was deleted
      # alongside the duplicated source). Cross-renderer parity
      # (TUI / web / GPUI / Freya / Cocoa / Android) is covered in
      # `isonim-examples/tests/test_vm_parity_across_renderers.nim`.
      # Cross-repo CI gating happens in the `isonim-examples` workflow;
      # this repo only verifies the renderer + JNI surface here.
      #
      # The Tier 2 (Robolectric) + Tier 3 (instrumented) suites and
      # Paparazzi snapshot tests are gated separately because they
      # require Gradle + a connected device or emulator. See
      # `Justfile` recipes `test-robolectric`, `test-device`,
      # `test-snapshots` and the EX-M6 status block in
      # `codetracer-specs/Front-Ends/IsoNim/isonim-render-stream.status.org`.
